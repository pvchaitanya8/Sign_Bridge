<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary meta ─────────────────────────────── -->
    <title>SignBridge — ASL Translator</title>
    <meta name="description"
          content="Real-time two-way communication between ASL signers and hearing non-signers. Sign with your camera, speak with your voice." />
    <meta name="theme-color" content="#E63946" />

    <!-- ── Fonts ─────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />

    <!-- ── Favicon ───────────────────────────────────── -->
    <!-- SVG favicon — supported by Chrome 80+, Firefox 83+, Safari 12+, Edge 80+ -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fallback PNG for older browsers (Vite will copy it from /public) -->
    <link rel="alternate icon" type="image/png" href="/favicon.svg" />
    <!-- Apple touch icon — Safari on iOS uses this for home screen -->
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- ── Open Graph (social sharing preview) ───────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="SignBridge — ASL Translator" />
    <meta property="og:description" content="Real-time two-way communication between ASL signers and hearing non-signers." />
    <meta property="og:image"       content="/favicon.svg" />

    <!-- ── Twitter card ─────────────────────────────── -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="SignBridge — ASL Translator" />
    <meta name="twitter:description" content="Real-time ASL translation. Sign with your camera, speak with your voice." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
