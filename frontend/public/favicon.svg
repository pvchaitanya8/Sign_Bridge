<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">
  <defs>
    <!-- Signal-red gradient — bright top, deep base (matches app accent) -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FF5469"/>
      <stop offset="100%" stop-color="#BE1A28"/>
    </linearGradient>

    <!-- Skeuomorphic gloss — top-left hemisphere sheen (matches btn-primary) -->
    <radialGradient id="gloss" cx="30%" cy="22%" r="68%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Badge background ──────────────────────────────── -->
  <!-- Main fill -->
  <rect width="32" height="32" rx="6.5" fill="url(#bg)"/>
  <!-- 1-px bright bevel along the top rim (skeuomorphic highlight) -->
  <rect x="1" y="0.75" width="30" height="1.5" rx="0.75"
        fill="rgba(255,255,255,0.32)"/>
  <!-- Gloss overlay -->
  <rect width="32" height="32" rx="6.5" fill="url(#gloss)"/>

  <!-- ── "SB" monogram — matches App header badge ─────── -->
  <text
    x="15.5" y="21.5"
    text-anchor="middle"
    font-family="'Cascadia Code','SF Mono','Consolas','Menlo',ui-monospace,monospace"
    font-size="14.5"
    font-weight="700"
    letter-spacing="-0.5"
    fill="white">SB</text>

  <!-- ── Status dot — top-right corner (matches header badge) ── -->
  <circle cx="26.5" cy="5.5" r="2.6" fill="white"/>
</svg>
