<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">
  <defs>
    <!-- Emerald gradient — bright top-left to deep bottom-right -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#34d399"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <!-- Subtle gloss shine -->
    <radialGradient id="shine" cx="35%" cy="28%" r="65%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background (iOS-style ~22% radius) -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="32" rx="7" fill="url(#shine)"/>

  <!-- Open hand icon — 4 fingers + palm, white
       Clear at both 16×16 and 32×32 -->

  <!-- Palm -->
  <rect x="7"    y="19"  width="18"  height="9"  rx="3.5"  fill="white"/>
  <!-- Index finger -->
  <rect x="7.5"  y="8"   width="3.5" height="13" rx="1.75" fill="white"/>
  <!-- Middle finger (tallest) -->
  <rect x="12.2" y="5.5" width="3.5" height="15" rx="1.75" fill="white"/>
  <!-- Ring finger -->
  <rect x="16.8" y="7"   width="3.5" height="14" rx="1.75" fill="white"/>
  <!-- Pinky -->
  <rect x="21.2" y="10"  width="3"   height="11" rx="1.5"  fill="white"/>
</svg>
